name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip libffi-dev libssl-dev zlib1g-dev libncurses5-dev libgdbm-dev libc6-dev libnss3-dev libreadline-dev libsqlite3-dev wget llvm

    - name: Install Python dependencies
      run: |
        pip install buildozer cython kivy==2.2.1

    - name: Set up Android SDK
      run: |
        mkdir -p android-sdk/cmdline-tools
        cd android-sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip
        mv cmdline-tools latest
        rm cmdline-tools.zip
        cd ../..
        echo "ANDROIDSDK=$GITHUB_WORKSPACE/android-sdk" >> $GITHUB_ENV
        echo "PATH=$GITHUB_WORKSPACE/android-sdk/cmdline-tools/latest/bin:$GITHUB_WORKSPACE/android-sdk/platform-tools:$PATH" >> $GITHUB_ENV

    - name: Accept Android licenses
      run: yes | $ANDROIDSDK/cmdline-tools/latest/bin/sdkmanager --licenses

    - name: Install Android SDK components
      run: |
        $ANDROIDSDK/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.1"

    - name: Build APK
      run: |
        buildozer android debug
      env:
        BUILDOZER_ANDROID_MINSDK: 21

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: clothing-factory-app
        path: bin/*.apk
